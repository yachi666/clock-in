name: Presence
options:
  bundleIdPrefix: com.presence
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
schemes:
  Presence:
    build:
      targets:
        Presence: all
        PresenceTests: [test]
        PresenceWidget: all
    test:
      targets:
        - PresenceTests
targets:
  Presence:
    type: application
    platform: iOS
    sources:
      - path: Presence
      - path: Shared
    resources:
      - path: Presence/Resources
        optional: true
    dependencies:
      - target: PresenceWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.presence.app
        INFOPLIST_FILE: Presence/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    entitlements:
      path: Presence/Presence.entitlements
  PresenceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PresenceTests
    dependencies:
      - target: Presence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.presence.app.tests
        INFOPLIST_FILE: PresenceTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Presence.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Presence"
        BUNDLE_LOADER: "$(TEST_HOST)"
  PresenceWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PresenceWidget
      - path: Shared/LiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.presence.app.widget
        INFOPLIST_FILE: PresenceWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
